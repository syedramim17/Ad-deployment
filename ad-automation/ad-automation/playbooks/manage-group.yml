---
# Create ONE security/distribution group in a chosen OU.
- name: Create an Active Directory group
  hosts: dc
  gather_facts: false

  vars_prompt:
    - name: group_name
      prompt: "Name of the group (e.g. Sales-Team)"
      private: false

    - name: group_scope
      prompt: "Scope: global, domainlocal, or universal"
      private: false
      default: "global"

    - name: group_category
      prompt: "Category: security or distribution"
      private: false
      default: "security"

    - name: target_ou
      prompt: "OU to place the group in, or blank for the domain root"
      private: false
      default: ""

  tasks:
    - name: Ask this DC for its own domain base DN
      ansible.windows.win_powershell:
        script: |
          $ErrorActionPreference = 'Stop'
          $Ansible.Result = (Get-ADDomain).DistinguishedName
          $Ansible.Changed = $false
      register: domain_info

    - name: Build the group path
      ansible.builtin.set_fact:
        group_path: >-
          {{ ('OU=' ~ target_ou ~ ',' ~ domain_info.result)
             if target_ou else domain_info.result }}

    - name: Create the group
      microsoft.ad.group:
        name: "{{ group_name }}"
        scope: "{{ group_scope }}"
        category: "{{ group_category }}"
        path: "{{ group_path }}"
        state: present
        protect_from_deletion: true
