---
# ============================================================================
# manage-bitlocker.yml
# ----------------------------------------------------------------------------
# Deploys BitLocker management onto the bare-metal domain controller.
#
#   - Asserts a TPM is present and ready FIRST (fail-fast). OS-drive encryption
#     here relies on the TPM to unlock the volume automatically at boot; without
#     a TPM the machine would halt at the recovery screen on every reboot.
#   - Ensures the BitLocker feature is installed. The FIRST run reboots the DC
#     once to finish the install; later runs find it present and skip the reboot.
#   - Escrows any recovery-password protectors to Active Directory by calling
#     Backup-BitLockerKeyProtector explicitly (no escrow GPO required). The
#     recovery info is written to the DC's own computer object in AD.
#   - Reports the current BitLocker status of the OS volume.
#
# The block that actually ENCRYPTS the OS drive is commented out on purpose.
# Before you enable it:
#   * Have console / out-of-band access (iDRAC / iLO) and the recovery key in
#     hand. A firmware or TPM change that breaks auto-unlock will hold the DC at
#     the BitLocker recovery screen on next boot.
#   * On bare metal with a healthy TPM the volume unlocks unattended at boot.
#   * Once enabled, the escrow task below picks up the new recovery password and
#     pushes it to AD on the same run.
#
# Collections: ansible.windows
# Target:      dc
# ============================================================================

- name: Manage BitLocker on the domain controller
  hosts: dc
  gather_facts: false

  vars:
    bitlocker_drive: "C:"            # OS volume on the DC to manage / escrow
    encryption_method: "XtsAes256"   # used by the commented-out encryption block

  tasks:

    - name: Query TPM state
      ansible.windows.win_powershell:
        script: |
          $tpm = Get-Tpm
          $Ansible.Result = @{
            Present   = [bool]$tpm.TpmPresent
            Ready     = [bool]$tpm.TpmReady
            Enabled   = [bool]$tpm.TpmEnabled
            Activated = [bool]$tpm.TpmActivated
          }
          $Ansible.Changed = $false
      register: tpm_status

    - name: Require a present, ready TPM before going further
      ansible.builtin.assert:
        that:
          - tpm_status.result.Present
          - tpm_status.result.Ready
        success_msg: "TPM is present and ready."
        fail_msg: >-
          TPM is not present or not ready on the DC. This playbook assumes a TPM
          protector so the OS volume can unlock unattended at boot. Enable and
          activate the TPM in UEFI/BIOS, then re-run.

    - name: Ensure the BitLocker feature is installed
      ansible.windows.win_feature:
        name: BitLocker
        include_sub_features: true
        include_management_tools: true
        state: present
      register: bitlocker_feature

    - name: Reboot the DC if the feature install requires it
      ansible.windows.win_reboot:
        msg: "Rebooting to finish BitLocker feature installation."
      when: bitlocker_feature.reboot_required

    # ------------------------------------------------------------------------
    # OS DRIVE ENCRYPTION — DISABLED ON PURPOSE
    # ------------------------------------------------------------------------
    # Uncomment to encrypt the OS volume with a TPM protector plus a recovery
    # password. The recovery password is escrowed to AD by the next task on the
    # same run. Review the warnings in the header before enabling.
    #
    # - name: Encrypt the OS drive (TPM + recovery password)
    #   ansible.windows.win_powershell:
    #     script: |
    #       $vol = Get-BitLockerVolume -MountPoint "{{ bitlocker_drive }}"
    #       if ($vol.VolumeStatus -eq "FullyDecrypted") {
    #         Enable-BitLocker -MountPoint "{{ bitlocker_drive }}" `
    #           -EncryptionMethod {{ encryption_method }} `
    #           -TpmProtector `
    #           -SkipHardwareTest | Out-Null
    #         Add-BitLockerKeyProtector -MountPoint "{{ bitlocker_drive }}" `
    #           -RecoveryPasswordProtector | Out-Null
    #         $Ansible.Changed = $true
    #       } else {
    #         $Ansible.Changed = $false
    #       }
    #   register: os_encryption

    - name: Escrow recovery password protectors to Active Directory
      ansible.windows.win_powershell:
        script: |
          $changed  = $false
          $escrowed = @()
          $vol = Get-BitLockerVolume -MountPoint "{{ bitlocker_drive }}"
          $recovery = $vol.KeyProtector | Where-Object {
            $_.KeyProtectorType -eq "RecoveryPassword"
          }
          foreach ($p in $recovery) {
            Backup-BitLockerKeyProtector -MountPoint "{{ bitlocker_drive }}" `
              -KeyProtectorId $p.KeyProtectorId | Out-Null
            $escrowed += $p.KeyProtectorId
            $changed = $true
          }
          $Ansible.Result  = @{ Escrowed = $escrowed; Count = $escrowed.Count }
          $Ansible.Changed = $changed
      register: escrow_result

    - name: Report BitLocker status of the OS volume
      ansible.windows.win_powershell:
        script: |
          $vol = Get-BitLockerVolume -MountPoint "{{ bitlocker_drive }}"
          $Ansible.Result = @{
            MountPoint           = $vol.MountPoint
            VolumeStatus         = $vol.VolumeStatus.ToString()
            ProtectionStatus     = $vol.ProtectionStatus.ToString()
            EncryptionPercentage = $vol.EncryptionPercentage
            EncryptionMethod     = $vol.EncryptionMethod.ToString()
            KeyProtectors        = @($vol.KeyProtector |
                                     ForEach-Object { $_.KeyProtectorType.ToString() })
          }
          $Ansible.Changed = $false
      register: bitlocker_status

    - name: Show BitLocker status
      ansible.builtin.debug:
        var: bitlocker_status.result
